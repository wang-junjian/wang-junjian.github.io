<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="高中英语3500词快速记忆工具，支持随机抽词、释义隐藏、已会/未会标记和进度统计，帮助高效背诵高考核心词汇。">
  <meta name="keywords" content="高中英语, 3500词, 英语词汇, 单词记忆, 背单词, 高考词汇, Kimi K2.7 Code">

  <meta name="date" content="2026-06-23">
  <title>高中英语3500词 · 快速记忆</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --surface: #ffffff;
      --text: #1f2328;
      --muted: #656d76;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --border: #d1d5db;
      --shadow: 0 10px 40px rgba(0,0,0,0.08);
      --radius: 18px;
      --danger: #dc2626;
      --success: #16a34a;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }
    .app {
      display: flex;
      flex-direction: column;
      height: 100%;
      max-width: 720px;
      margin: 0 auto;
      padding: 16px;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
      flex-shrink: 0;
    }
    .title {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }
    .subtitle {
      font-size: 12px;
      color: var(--muted);
      font-weight: 500;
    }
    .header-actions {
      display: flex;
      gap: 8px;
    }
    .icon-btn {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 18px;
      transition: all 0.15s ease;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .icon-btn:hover { background: #f3f4f6; }
    .icon-btn.active { background: #eff6ff; border-color: var(--accent); color: var(--accent); }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 16px;
      min-height: 0;
    }

    .card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 40px 28px;
      text-align: center;
      cursor: pointer;
      position: relative;
      transition: transform 0.15s ease;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
    }
    .card:active { transform: scale(0.985); }
    .word {
      font-size: clamp(42px, 12vw, 72px);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -1px;
      word-break: break-word;
      margin-bottom: 18px;
    }
    .phonetic-hint {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 10px;
      min-height: 20px;
    }
    .meaning {
      font-size: clamp(22px, 6vw, 32px);
      color: var(--text);
      line-height: 1.5;
      padding: 16px;
      background: #f8fafc;
      border-radius: 12px;
      border: 1px dashed var(--border);
      min-height: 76px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .meaning.hidden {
      color: transparent;
      background: #f3f4f6;
      border-style: dashed;
    }
    .meaning.hidden::after {
      content: "点击或按空格显示释义";
      color: var(--muted);
      font-size: 16px;
      position: absolute;
    }
    .meaning {
      position: relative;
    }

    .progress {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: var(--muted);
      flex-shrink: 0;
    }
    .progress-bar {
      flex: 1;
      height: 6px;
      background: #e5e7eb;
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 3px;
      transition: width 0.2s ease;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      flex-shrink: 0;
    }
    .btn {
      border: none;
      border-radius: 14px;
      padding: 16px 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all 0.15s ease;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-secondary {
      background: #e5e7eb;
      color: var(--text);
    }
    .btn-secondary:hover { background: #d1d5db; }
    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-row {
      display: flex;
      gap: 10px;
      flex-shrink: 0;
    }
    .btn-row .btn { flex: 1; }

    .drawer {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      z-index: 50;
      display: flex;
      justify-content: flex-end;
    }
    .drawer.open {
      opacity: 1;
      pointer-events: auto;
    }
    .drawer-panel {
      width: min(420px, 90vw);
      height: 100%;
      background: var(--surface);
      transform: translateX(100%);
      transition: transform 0.25s ease;
      display: flex;
      flex-direction: column;
      padding: 20px;
    }
    .drawer.open .drawer-panel { transform: translateX(0); }
    .drawer-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      flex-shrink: 0;
    }
    .drawer-title { font-size: 18px; font-weight: 700; }
    .search-box {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 15px;
      margin-bottom: 12px;
      outline: none;
    }
    .search-box:focus { border-color: var(--accent); }
    .word-list {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      border-top: 1px solid var(--border);
    }
    .word-list-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 4px;
      border-bottom: 1px solid #f3f4f6;
      cursor: pointer;
      font-size: 15px;
    }
    .word-list-item:hover { background: #f9fafb; }
    .word-list-item span:first-child { font-weight: 600; }
    .word-list-item span:last-child { color: var(--muted); font-size: 13px; max-width: 60%; text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .settings-group {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 0;
      border-bottom: 1px solid #f3f4f6;
      font-size: 15px;
    }
    .switch {
      position: relative;
      width: 48px;
      height: 28px;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #d1d5db;
      border-radius: 28px;
      transition: 0.2s;
    }
    .slider::before {
      content: "";
      position: absolute;
      height: 22px;
      width: 22px;
      left: 3px;
      bottom: 3px;
      background: white;
      border-radius: 50%;
      transition: 0.2s;
    }
    .switch input:checked + .slider { background: var(--accent); }
    .switch input:checked + .slider::before { transform: translateX(20px); }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(31, 35, 40, 0.92);
      color: #fff;
      padding: 10px 18px;
      border-radius: 999px;
      font-size: 13px;
      opacity: 0;
      pointer-events: none;
      transition: all 0.25s ease;
      z-index: 100;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .empty-state {
      text-align: center;
      color: var(--muted);
      padding: 40px 20px;
    }

    @media (max-width: 480px) {
      .app { padding: 12px; }
      .card { padding: 32px 20px; }
      .btn { padding: 14px 8px; font-size: 15px; }
      .title { font-size: 16px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div>
        <div class="title">高中英语3500词</div>
        <div class="subtitle">快速记忆 · 点击卡片显示释义</div>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="btnAutoSpeak" title="切换单词时自动朗读 (A)">🔇</button>
        <button class="icon-btn" id="btnStar" title="收藏/标为不熟 (S)">☆</button>
        <button class="icon-btn" id="btnList" title="单词列表 (L)">☰</button>
        <button class="icon-btn" id="btnSettings" title="设置 (G)">⚙</button>
      </div>
    </header>

    <main>
      <div class="card" id="card">
        <div class="word" id="word">Loading…</div>
        <div class="meaning hidden" id="meaning">点击或按空格显示释义</div>
      </div>

      <div class="progress">
        <span id="progressText">1 / 3302</span>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <span id="modeLabel">顺序</span>
      </div>

      <div class="controls">
        <button class="btn btn-secondary" id="btnPrev">← 上一个</button>
        <button class="btn btn-primary" id="btnReveal">显示释义</button>
        <button class="btn btn-secondary" id="btnNext">下一个 →</button>
      </div>

      <div class="btn-row">
        <button class="btn btn-secondary" id="btnPlay">🔊 朗读</button>
        <button class="btn btn-secondary" id="btnRandom">🔀 随机</button>
        <button class="btn btn-secondary" id="btnShuffleMode">顺序/随机</button>
      </div>
    </main>
  </div>

  <!-- 单词列表抽屉 -->
  <div class="drawer" id="listDrawer">
    <div class="drawer-panel">
      <div class="drawer-header">
        <div class="drawer-title">单词列表</div>
        <button class="icon-btn" id="btnCloseList">✕</button>
      </div>
      <input class="search-box" id="searchBox" placeholder="搜索英文或中文释义…" autocomplete="off">
      <div class="word-list" id="wordList"></div>
    </div>
  </div>

  <!-- 设置抽屉 -->
  <div class="drawer" id="settingsDrawer">
    <div class="drawer-panel">
      <div class="drawer-header">
        <div class="drawer-title">设置</div>
        <button class="icon-btn" id="btnCloseSettings">✕</button>
      </div>
      <div class="settings-group">
        <span>切换单词时自动朗读</span>
        <label class="switch"><input type="checkbox" id="autoSpeak"><span class="slider"></span></label>
      </div>
      <div class="settings-group">
        <span>显示释义时自动朗读</span>
        <label class="switch"><input type="checkbox" id="speakOnReveal"><span class="slider"></span></label>
      </div>
      <div class="settings-group">
        <span>始终显示释义</span>
        <label class="switch"><input type="checkbox" id="alwaysShowMeaning"><span class="slider"></span></label>
      </div>
      <div class="settings-group">
        <span>显示释义后自动下一个</span>
        <label class="switch"><input type="checkbox" id="autoAdvance"><span class="slider"></span></label>
      </div>
      <div class="settings-group">
        <span>自动下一个延迟（秒）</span>
        <select id="autoAdvanceDelay" style="padding:6px 10px;border-radius:8px;border:1px solid var(--border);font-size:14px;">
          <option value="1">1</option>
          <option value="1.5">1.5</option>
          <option value="2" selected>2</option>
          <option value="3">3</option>
          <option value="4">4</option>
        </select>
      </div>
      <div class="settings-group">
        <span>朗读语速</span>
        <select id="speechRate" style="padding:6px 10px;border-radius:8px;border:1px solid var(--border);font-size:14px;">
          <option value="0.7">慢</option>
          <option value="1" selected>正常</option>
          <option value="1.3">快</option>
        </select>
      </div>
      <div class="settings-group">
        <span>朗读语音</span>
        <select id="voiceSelect" style="padding:6px 10px;border-radius:8px;border:1px solid var(--border);font-size:14px;max-width:200px;">
          <option value="">默认语音</option>
        </select>
      </div>
      <div class="settings-group">
        <span>过滤：仅显示收藏</span>
        <label class="switch"><input type="checkbox" id="onlyStarred"><span class="slider"></span></label>
      </div>
      <div style="margin-top:16px;color:var(--muted);font-size:13px;line-height:1.6;">
        快捷键：空格/点击 显示释义 · ← → 翻页 · R 随机 · P 朗读 · A 自动朗读 · S 收藏 · L 列表 · G 设置
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

      speakOnReveal: document.getElementById('speakOnReveal'),
      alwaysShowMeaning: document.getElementById('alwaysShowMeaning'),
      autoAdvance: document.getElementById('autoAdvance'),
      autoAdvanceDelay: document.getElementById('autoAdvanceDelay'),
      speechRate: document.getElementById('speechRate'),
      voiceSelect: document.getElementById('voiceSelect'),
      onlyStarred: document.getElementById('onlyStarred'),
      btnShuffleMode: document.getElementById('btnShuffleMode'),
      toast: document.getElementById('toast'),
    };

    function getWords() {
      if (state.onlyStarred) {
        const list = ALL_WORDS.filter((_, i) => state.starred.has(i));
        return list.length ? list : ALL_WORDS;
      }
      return ALL_WORDS;
    }

    function getActiveIndex() {
      if (state.onlyStarred) {
        const ids = ALL_WORDS.map((_, i) => i).filter(i => state.starred.has(i));
        if (!ids.length) return 0;
        const idx = ids.indexOf(state.index);
        return idx >= 0 ? idx : 0;
      }
      return state.index;
    }

    function rebuildOrder() {
      const words = getWords();
      state.order = words.map((_, i) => i);
      if (state.shuffle) {
        for (let i = state.order.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [state.order[i], state.order[j]] = [state.order[j], state.order[i]];
        }
      }
      state.index = Math.min(getActiveIndex(), state.order.length - 1);
      render();
    }

    function currentWord() {
      const words = getWords();
      const idx = state.order[state.index] ?? state.index;
      return words[idx] ?? words[0];
    }

    function currentGlobalIndex() {
      if (state.onlyStarred) {
        const words = getWords();
        const localIdx = state.order[state.index] ?? state.index;
        return ALL_WORDS.findIndex(w => w.word === words[localIdx].word && w.meaning === words[localIdx].meaning);
      }
      return state.order[state.index] ?? state.index;
    }

    function render() {
      const w = currentWord();
      const gidx = currentGlobalIndex();
      els.word.textContent = w.word;
      els.meaning.textContent = w.meaning;
      els.meaning.classList.toggle('hidden', !state.meaningVisible);
      els.btnReveal.textContent = state.meaningVisible ? '隐藏释义' : '显示释义';
      els.btnStar.textContent = state.starred.has(gidx) ? '★' : '☆';
      els.btnStar.classList.toggle('active', state.starred.has(gidx));
      els.btnAutoSpeak.textContent = state.autoSpeak ? '🔊' : '🔇';
      els.btnAutoSpeak.classList.toggle('active', state.autoSpeak);
      els.modeLabel.textContent = state.shuffle ? '随机' : (state.onlyStarred ? '收藏' : '顺序');
      els.progressText.textContent = `${state.index + 1} / ${state.order.length}`;
      els.progressFill.style.width = `${((state.index + 1) / state.order.length) * 100}%`;
    }

    function speak(text) {
      if (!window.speechSynthesis) {
        showToast('当前浏览器不支持语音朗读');
        return;
      }
      window.speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance(text);
      utter.lang = 'en-US';
      utter.rate = state.speechRate;

      const voices = window.speechSynthesis.getVoices();
      let voice = null;

      if (state.selectedVoiceURI) {
        voice = voices.find(v => v.voiceURI === state.selectedVoiceURI);
      }
      if (!voice) {
        voice = findPreferredBrowserVoice(voices);
      }
      if (!voice) {
        voice = voices.find(v => v.lang === 'en-US') || voices.find(v => v.lang.startsWith('en'));
      }
      if (voice) utter.voice = voice;

      window.speechSynthesis.speak(utter);
    }

    function getEnglishVoices() {
      if (!window.speechSynthesis) return [];
      return window.speechSynthesis.getVoices()
        .filter(v => v.lang.startsWith('en'))
        .sort((a, b) => {
          // 优先 en-US，再按名字排序
          if (a.lang === 'en-US' && b.lang !== 'en-US') return -1;
          if (b.lang === 'en-US' && a.lang !== 'en-US') return 1;
          return a.name.localeCompare(b.name);
        });
    }

    function findPreferredBrowserVoice(voices) {
      const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
      const isChrome = /chrome/i.test(navigator.userAgent) && /google inc/i.test(navigator.vendor.toLowerCase());
      const enVoices = voices.filter(v => v.lang.startsWith('en'));
      if (!enVoices.length) return null;
      const pool = enVoices.filter(v => v.lang === 'en-US').length
        ? enVoices.filter(v => v.lang === 'en-US')
        : enVoices;

      if (isSafari) {
        return pool.find(v => /Samantha/i.test(v.name)) || null;
      }
      if (isChrome) {
        const avaPool = pool.filter(v => /Ava/i.test(v.name));
        if (!avaPool.length) return null;
        const enhanced = avaPool.find(v => /Enhanced|Premium|优化/i.test(v.name));
        return enhanced || avaPool[0];
      }
      return null;
    }

    function populateVoices() {
      if (!window.speechSynthesis) return;
      const voices = getEnglishVoices();
      const currentValue = els.voiceSelect.value || state.selectedVoiceURI;
      els.voiceSelect.innerHTML = '<option value="">默认语音（自动选择）</option>';
      voices.forEach(v => {
        const option = document.createElement('option');
        option.value = v.voiceURI;
        option.textContent = `${v.name} (${v.lang})`;
        els.voiceSelect.appendChild(option);
      });
      // 恢复用户之前的选择，或按浏览器优先推荐
      if (currentValue && voices.some(v => v.voiceURI === currentValue)) {
        els.voiceSelect.value = currentValue;
      } else {
        const preferred = findPreferredBrowserVoice(voices);
        if (preferred) {
          els.voiceSelect.value = preferred.voiceURI;
          state.selectedVoiceURI = preferred.voiceURI;
          localStorage.setItem('english2025_selectedVoiceURI', preferred.voiceURI);
        }
      }
    }

    function scheduleAutoAdvance() {
      if (!state.autoAdvance) return;
      clearTimeout(state.advanceTimer);
      const delay = Math.max(500, state.autoAdvanceDelay * 1000);
      state.advanceTimer = setTimeout(() => next(1), delay);
    }

    function reveal() {
      if (state.meaningVisible) return;
      state.meaningVisible = true;
      localStorage.setItem('english2025_meaningVisible', 'true');
      els.alwaysShowMeaning.checked = true;
      render();
      if (state.speakOnReveal) speak(currentWord().word);
      scheduleAutoAdvance();
    }

    function hideMeaning() {
      state.meaningVisible = false;
      localStorage.setItem('english2025_meaningVisible', 'false');
      els.alwaysShowMeaning.checked = false;
      clearTimeout(state.advanceTimer);
      render();
    }

    function toggleReveal() {
      if (state.meaningVisible) hideMeaning(); else reveal();
    }

    function next(delta) {
      const len = state.order.length;
      if (!len) return;
      state.index = (state.index + delta + len) % len;
      clearTimeout(state.advanceTimer);
      render();
      if (state.autoSpeak) speak(currentWord().word);
      if (state.meaningVisible) scheduleAutoAdvance();
    }

    function goRandom() {
      const len = state.order.length;
      if (len < 2) return;
      let nextIdx;
      do { nextIdx = Math.floor(Math.random() * len); } while (nextIdx === state.index);
      state.index = nextIdx;
      clearTimeout(state.advanceTimer);
      render();
      if (state.autoSpeak) speak(currentWord().word);
      if (state.meaningVisible) scheduleAutoAdvance();
    }

    function toggleAutoSpeak() {
      state.autoSpeak = !state.autoSpeak;
      localStorage.setItem('english2025_autoSpeak', state.autoSpeak);
      render();
      showToast(state.autoSpeak ? '已开启切换单词时自动朗读' : '已关闭切换单词时自动朗读');
      if (state.autoSpeak) speak(currentWord().word);
    }

    function toggleStar() {
      const gidx = currentGlobalIndex();
      if (state.starred.has(gidx)) state.starred.delete(gidx);
      else state.starred.add(gidx);
      localStorage.setItem('english2025_starred', JSON.stringify([...state.starred]));
      render();
      showToast(state.starred.has(gidx) ? '已收藏' : '已取消收藏');
    }

    function toggleShuffle() {
      state.shuffle = !state.shuffle;
      rebuildOrder();
      showToast(state.shuffle ? '已切换为随机模式' : '已切换为顺序模式');
    }

    function showToast(msg) {
      els.toast.textContent = msg;
      els.toast.classList.add('show');
      clearTimeout(state.toastTimer);
      state.toastTimer = setTimeout(() => els.toast.classList.remove('show'), 1800);
    }

    function openList() {
      els.listDrawer.classList.add('open');
      renderWordList();
      setTimeout(() => els.searchBox.focus(), 100);
    }

    function closeList() {
      els.listDrawer.classList.remove('open');
    }

    function openSettings() {
      els.settingsDrawer.classList.add('open');
    }

    function closeSettings() {
      els.settingsDrawer.classList.remove('open');
    }

    function renderWordList(filter = '') {
      const term = filter.trim().toLowerCase();
      const items = ALL_WORDS.map((w, i) => ({ ...w, originalIndex: i }))
        .filter(w => !term || w.word.toLowerCase().includes(term) || w.meaning.toLowerCase().includes(term));
      if (!items.length) {
        els.wordList.innerHTML = '<div class="empty-state">未找到匹配的单词</div>';
        return;
      }
      els.wordList.innerHTML = items.map(w => `
        <div class="word-list-item" data-idx="${w.originalIndex}">
          <span>${w.word}</span>
          <span>${w.meaning}</span>
        </div>
      `).join('');
      els.wordList.querySelectorAll('.word-list-item').forEach(el => {
        el.addEventListener('click', () => {
          const idx = parseInt(el.dataset.idx, 10);
          state.onlyStarred = false;
          els.onlyStarred.checked = false;
          localStorage.setItem('english2025_onlyStarred', 'false');
          state.shuffle = false;
          rebuildOrder();
          state.index = state.order.indexOf(idx);
          if (state.index < 0) state.index = idx;
          clearTimeout(state.advanceTimer);
          render();
          if (state.meaningVisible) scheduleAutoAdvance();
          closeList();
        });
      });
    }

    // 事件绑定
    els.card.addEventListener('click', toggleReveal);
    els.btnReveal.addEventListener('click', toggleReveal);
    els.btnNext.addEventListener('click', () => next(1));
    els.btnPrev.addEventListener('click', () => next(-1));
    els.btnRandom.addEventListener('click', goRandom);
    els.btnPlay.addEventListener('click', () => speak(currentWord().word));
    els.btnStar.addEventListener('click', toggleStar);
    els.btnShuffleMode.addEventListener('click', toggleShuffle);
    els.btnList.addEventListener('click', openList);
    els.btnCloseList.addEventListener('click', closeList);
    els.btnSettings.addEventListener('click', openSettings);
    els.btnCloseSettings.addEventListener('click', closeSettings);
    els.searchBox.addEventListener('input', e => renderWordList(e.target.value));

    els.autoSpeak.checked = state.autoSpeak;
    els.speakOnReveal.checked = state.speakOnReveal;
    els.alwaysShowMeaning.checked = state.meaningVisible;
    els.autoAdvance.checked = state.autoAdvance;
    els.autoAdvanceDelay.value = String(state.autoAdvanceDelay);
    els.speechRate.value = String(state.speechRate);
    populateVoices();
    if (state.selectedVoiceURI && els.voiceSelect.querySelector(`option[value="${state.selectedVoiceURI}"]`)) {
      els.voiceSelect.value = state.selectedVoiceURI;
    }
    els.onlyStarred.checked = state.onlyStarred;

    els.btnAutoSpeak.addEventListener('click', toggleAutoSpeak);
    els.autoSpeak.addEventListener('change', e => { state.autoSpeak = e.target.checked; localStorage.setItem('english2025_autoSpeak', state.autoSpeak); render(); if (state.autoSpeak) speak(currentWord().word); });
    els.speakOnReveal.addEventListener('change', e => { state.speakOnReveal = e.target.checked; localStorage.setItem('english2025_speakOnReveal', state.speakOnReveal); showToast(state.speakOnReveal ? '已开启显示释义时自动朗读' : '已关闭显示释义时自动朗读'); });
    els.alwaysShowMeaning.addEventListener('change', e => { if (e.target.checked) reveal(); else hideMeaning(); });
    els.autoAdvance.addEventListener('change', e => { state.autoAdvance = e.target.checked; localStorage.setItem('english2025_autoAdvance', state.autoAdvance); if (!state.autoAdvance) clearTimeout(state.advanceTimer); });
    els.autoAdvanceDelay.addEventListener('change', e => { state.autoAdvanceDelay = parseFloat(e.target.value); localStorage.setItem('english2025_autoAdvanceDelay', state.autoAdvanceDelay); });
    els.speechRate.addEventListener('change', e => { state.speechRate = parseFloat(e.target.value); localStorage.setItem('english2025_speechRate', state.speechRate); });
    els.voiceSelect.addEventListener('change', e => { state.selectedVoiceURI = e.target.value; localStorage.setItem('english2025_selectedVoiceURI', state.selectedVoiceURI); showToast(state.selectedVoiceURI ? '已切换语音' : '已恢复默认语音'); });
    els.onlyStarred.addEventListener('change', e => {
      state.onlyStarred = e.target.checked;
      localStorage.setItem('english2025_onlyStarred', state.onlyStarred);
      rebuildOrder();
    });

    document.addEventListener('keydown', e => {
      if (e.target.matches('input, select, textarea')) return;
      switch (e.key) {
        case ' ': e.preventDefault(); toggleReveal(); break;
        case 'ArrowRight': e.preventDefault(); next(1); break;
        case 'ArrowLeft': e.preventDefault(); next(-1); break;
        case 'r': case 'R': goRandom(); break;
        case 'p': case 'P': speak(currentWord().word); break;
        case 'a': case 'A': toggleAutoSpeak(); break;
        case 's': case 'S': toggleStar(); break;
        case 'l': case 'L': openList(); break;
        case 'g': case 'G': openSettings(); break;
        case 'Escape': closeList(); closeSettings(); break;
      }
    });

    // 点击抽屉背景关闭
    [els.listDrawer, els.settingsDrawer].forEach(d => {
      d.addEventListener('click', e => { if (e.target === d) d.classList.remove('open'); });
    });

    // 初始化语音列表（某些浏览器需要异步加载）
    if (window.speechSynthesis) {
      populateVoices();
      window.speechSynthesis.onvoiceschanged = () => populateVoices();
    }

    rebuildOrder();
    if (state.autoSpeak) speak(currentWord().word);
  </script>
</body>
</html>
