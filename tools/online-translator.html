<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="免费在线翻译工具，支持 MyMemory、LibreTranslate、Lingva 等多种翻译源，无需注册即可使用。">
    <meta name="keywords" content="翻译, 免费翻译, 在线翻译, MyMemory, LibreTranslate, Lingva, 语音朗读">
    <meta name="author" content="军舰">
    <meta name="date" content="2026-06-25">
    <title>免费在线翻译工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f0f4f8;
            min-height: 100vh;
            color: #334155;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            width: 100%;
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-shrink: 0;
        }

        header h1 {
            font-size: 1.4rem;
            font-weight: 600;
            color: #1e293b;
        }

        .btn-icon {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 14px;
            color: #475569;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-icon:hover {
            background: #f8fafc;
            border-color: #cbd5e1;
        }

        .settings-panel {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            display: none;
            flex-shrink: 0;
        }

        .settings-panel.open {
            display: block;
        }

        .settings-row {
            display: flex;
            gap: 16px;
            align-items: center;
            flex-wrap: wrap;
        }

        .api-toggle {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .api-toggle label {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 20px;
            background: #f1f5f9;
            font-size: 13px;
            color: #475569;
            transition: all 0.2s;
        }

        .api-toggle input[type="radio"] {
            display: none;
        }

        .api-toggle input[type="radio"]:checked + span {
            background: #2563eb;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            margin: -6px -12px;
            display: inline-block;
        }

        .setting-item {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            min-width: 260px;
        }

        .setting-item label {
            font-size: 13px;
            color: #64748b;
            white-space: nowrap;
        }

        input[type="text"], select {
            padding: 8px 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 13px;
            background: white;
            outline: none;
        }

        input[type="text"]:focus, select:focus {
            border-color: #2563eb;
        }

        input[type="text"] {
            flex: 1;
            min-width: 180px;
        }

        .translator {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            background: white;
            border-radius: 16px;
            border: 1px solid #e2e8f0;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
        }

        .lang-bar {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            border-bottom: 1px solid #e2e8f0;
            align-items: center;
        }

        .lang-tabs {
            display: flex;
            gap: 4px;
            padding: 0 12px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .lang-tabs::-webkit-scrollbar {
            display: none;
        }

        .lang-tab {
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            padding: 14px 12px;
            cursor: pointer;
            font-size: 14px;
            color: #64748b;
            white-space: nowrap;
            transition: all 0.2s;
            font-weight: 500;
            font-family: inherit;
        }

        .lang-tab:hover {
            color: #334155;
            background: #f8fafc;
        }

        .lang-tab.active {
            color: #2563eb;
            border-bottom-color: #2563eb;
        }

        .lang-more {
            border: none;
            background: transparent;
            color: #64748b;
            font-size: 14px;
            padding: 14px 8px;
            cursor: pointer;
            outline: none;
            font-family: inherit;
        }

        .lang-more:focus {
            color: #2563eb;
        }

        .swap-btn {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #64748b;
            transition: all 0.2s;
            z-index: 1;
            font-size: 1rem;
        }

        .swap-btn:hover {
            border-color: #2563eb;
            color: #2563eb;
            transform: rotate(180deg);
        }

        .panels {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            min-height: 0;
        }

        .panel {
            display: flex;
            flex-direction: column;
            min-height: 0;
            position: relative;
        }

        .panel:first-child {
            border-right: 1px solid #e2e8f0;
        }

        textarea {
            flex: 1;
            width: 100%;
            border: none;
            resize: none;
            padding: 24px;
            font-size: 1.25rem;
            line-height: 1.6;
            color: #1e293b;
            font-family: inherit;
            outline: none;
            min-height: 0;
        }

        textarea::placeholder {
            color: #94a3b8;
        }

        .output-text {
            flex: 1;
            padding: 24px;
            font-size: 1.25rem;
            line-height: 1.6;
            color: #1e293b;
            word-wrap: break-word;
            white-space: pre-wrap;
            overflow-y: auto;
            min-height: 0;
        }

        .output-text.placeholder {
            color: #94a3b8;
        }

        .panel-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 24px;
            border-top: 1px solid #f1f5f9;
            flex-shrink: 0;
        }

        .actions {
            display: flex;
            gap: 4px;
        }

        .actions button {
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            font-size: 1.1rem;
            color: #94a3b8;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .actions button:hover {
            background: #f1f5f9;
            color: #475569;
        }

        .char-count {
            font-size: 12px;
            color: #94a3b8;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1e293b;
            color: white;
            padding: 12px 24px;
            border-radius: 10px;
            opacity: 0;
            transition: all 0.3s;
            z-index: 1000;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        @media (max-width: 768px) {
            .container {
                padding: 12px;
            }

            .lang-bar {
                grid-template-columns: 1fr;
            }

            .swap-btn {
                display: none;
            }

            .panels {
                grid-template-columns: 1fr;
            }

            .panel:first-child {
                border-right: none;
                border-bottom: 1px solid #e2e8f0;
            }

            .lang-tab {
                padding: 12px 10px;
                font-size: 13px;
            }

            textarea, .output-text {
                padding: 16px;
                font-size: 1.1rem;
                min-height: 160px;
            }

            .panel-footer {
                padding: 10px 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌐 免费翻译工具</h1>
            <button class="btn-icon" onclick="toggleSettings()" title="设置">
                <span>⚙️</span>
                <span>设置</span>
            </button>
        </header>

        <div class="settings-panel" id="settingsPanel">
            <div class="settings-row">
                <div class="api-toggle">
                    <label>
                        <input type="radio" name="api" value="mymemory" checked onchange="toggleApi()">
                        <span>MyMemory</span>
                    </label>
                    <label>
                        <input type="radio" name="api" value="lingva" onchange="toggleApi()">
                        <span>Lingva</span>
                    </label>
                    <label>
                        <input type="radio" name="api" value="libre" onchange="toggleApi()">
                        <span>LibreTranslate</span>
                    </label>
                </div>
                <div class="setting-item" id="lingvaUrlRow" style="display:none; flex:1;">
                    <label>服务地址：</label>
                    <input type="text" id="lingvaUrl" placeholder="https://lingva.ml" value="https://lingva.ml">
                </div>
                <div class="setting-item" id="libreUrlRow" style="display:none; flex:1;">
                    <label>服务地址：</label>
                    <input type="text" id="libreUrl" placeholder="http://localhost:5000" value="http://localhost:5000">
                </div>
            </div>
        </div>

        <div class="translator">
            <div class="lang-bar">
                <div class="lang-tabs" id="sourceTabs"></div>
                <button class="swap-btn" onclick="swapLang()" title="交换语言">⇄</button>
                <div class="lang-tabs" id="targetTabs"></div>
            </div>

            <div class="panels">
                <div class="panel">
                    <textarea id="inputText" placeholder="请输入要翻译的文本..."></textarea>
                    <div class="panel-footer">
                        <div class="actions">
                            <button id="speakInput" onclick="speak('input')" title="朗读">🔊</button>
                            <button onclick="clearText()" title="清空">🗑️</button>
                        </div>
                        <div class="char-count" id="inputCount">0</div>
                    </div>
                </div>

                <div class="panel">
                    <div class="output-text placeholder" id="outputText">翻译</div>
                    <div class="panel-footer">
                        <div class="actions">
                            <button id="speakOutput" onclick="speak('output')" title="朗读">🔊</button>
                            <button onclick="copyResult()" title="复制">📋</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="toast" id="toast"></div>
    </div>

    <script>
        const languages = [
            { code: 'auto', label: '检测语言' },
            { code: 'zh', label: '中文（简体）' },
            { code: 'en', label: '英语' },
            { code: 'ja', label: '日语' },
            { code: 'de', label: '德语' },
            { code: 'fr', label: '法语' },
            { code: 'es', label: '西班牙语' },
            { code: 'ko', label: '韩语' },
            { code: 'ru', label: '俄语' },
            { code: 'it', label: '意大利语' },
            { code: 'pt', label: '葡萄牙语' },
            { code: 'ar', label: '阿拉伯语' }
        ];

        const quickSource = ['auto', 'en', 'zh', 'ja', 'de'];
        const quickTarget = ['zh', 'en', 'ja', 'de', 'fr'];

        let sourceLang = 'en';
        let targetLang = 'zh';

        // 根据浏览器语言调整默认目标语
        const browserLang = navigator.language || navigator.userLanguage;
        if (browserLang.startsWith('zh')) {
            sourceLang = 'en';
            targetLang = 'zh';
        } else {
            sourceLang = 'zh';
            targetLang = browserLang.split('-')[0] || 'en';
        }

        const STORAGE_KEY = 'translate.settings';

        function saveSettings() {
            const settings = {
                sourceLang,
                targetLang,
                api: document.querySelector('input[name="api"]:checked')?.value || 'mymemory',
                lingvaUrl: document.getElementById('lingvaUrl').value,
                libreUrl: document.getElementById('libreUrl').value
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(settings));
        }

        function loadSettings() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (!raw) return;
                const settings = JSON.parse(raw);

                if (settings.sourceLang && languages.some(l => l.code === settings.sourceLang)) {
                    sourceLang = settings.sourceLang;
                }
                if (settings.targetLang && languages.some(l => l.code === settings.targetLang && l.code !== 'auto')) {
                    targetLang = settings.targetLang;
                }
                if (settings.api) {
                    const radio = document.querySelector(`input[name="api"][value="${settings.api}"]`);
                    if (radio) radio.checked = true;
                }
                if (settings.lingvaUrl) {
                    document.getElementById('lingvaUrl').value = settings.lingvaUrl;
                }
                if (settings.libreUrl) {
                    document.getElementById('libreUrl').value = settings.libreUrl;
                }
            } catch (e) {
                console.error('加载设置失败', e);
            }
        }

        function renderLangTabs(containerId, selected, quickCodes, isSource) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';

            // 目标语言不允许“检测语言”
            const availableLanguages = isSource ? languages : languages.filter(l => l.code !== 'auto');

            // 如果当前选中语言不在快捷列表里，把它插到最前面显示
            const codes = quickCodes.includes(selected) ? quickCodes : [selected, ...quickCodes];

            codes.forEach(code => {
                const lang = availableLanguages.find(l => l.code === code);
                if (!lang) return;
                const btn = document.createElement('button');
                btn.className = 'lang-tab' + (code === selected ? ' active' : '');
                btn.textContent = lang.label;
                btn.onclick = () => setLang(isSource ? 'source' : 'target', code);
                container.appendChild(btn);
            });

            const select = document.createElement('select');
            select.className = 'lang-more';
            select.innerHTML = `<option value="">更多语言</option>` +
                availableLanguages
                    .filter(l => !codes.includes(l.code))
                    .map(l => `<option value="${l.code}" ${l.code === selected ? 'selected' : ''}>${l.label}</option>`)
                    .join('');
            select.onchange = (e) => {
                if (e.target.value) {
                    setLang(isSource ? 'source' : 'target', e.target.value);
                }
            };
            container.appendChild(select);
        }

        function setLang(type, code) {
            if (type === 'target' && code === 'auto') return;
            if (type === 'source') sourceLang = code;
            else targetLang = code;
            renderLangTabs('sourceTabs', sourceLang, quickSource, true);
            renderLangTabs('targetTabs', targetLang, quickTarget, false);
            saveSettings();

            // 语言变动时实时翻译
            const text = document.getElementById('inputText').value.trim();
            if (text) {
                doTranslate();
            }
        }

        function toggleSettings() {
            document.getElementById('settingsPanel').classList.toggle('open');
        }

        function toggleApi() {
            const api = document.querySelector('input[name="api"]:checked').value;
            document.getElementById('lingvaUrlRow').style.display = api === 'lingva' ? 'flex' : 'none';
            document.getElementById('libreUrlRow').style.display = api === 'libre' ? 'flex' : 'none';
            saveSettings();

            // 翻译源变动时实时翻译
            const text = document.getElementById('inputText').value.trim();
            if (text) {
                doTranslate();
            }
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        let translateTimer = null;
        let currentAbortController = null;
        let translateRequestId = 0;

        function debounceTranslate(delay = 600) {
            clearTimeout(translateTimer);
            translateTimer = setTimeout(() => {
                const text = document.getElementById('inputText').value.trim();
                if (text) {
                    doTranslate();
                } else {
                    if (currentAbortController) {
                        currentAbortController.abort();
                        currentAbortController = null;
                    }
                    const output = document.getElementById('outputText');
                    output.textContent = '翻译';
                    output.classList.add('placeholder');
                }
            }, delay);
        }

        function clearText() {
            document.getElementById('inputText').value = '';
            const output = document.getElementById('outputText');
            output.textContent = '翻译';
            output.classList.add('placeholder');
            document.getElementById('inputCount').textContent = '0';
            if (currentAbortController) {
                currentAbortController.abort();
                currentAbortController = null;
            }
        }

        function swapLang() {
            if (sourceLang === 'auto') {
                showToast('自动检测模式下无法交换');
                return;
            }

            const temp = sourceLang;
            sourceLang = targetLang;
            targetLang = temp;
            renderLangTabs('sourceTabs', sourceLang, quickSource, true);
            renderLangTabs('targetTabs', targetLang, quickTarget, false);

            const input = document.getElementById('inputText');
            const output = document.getElementById('outputText');
            if (!output.classList.contains('placeholder') && output.textContent.trim()) {
                input.value = output.textContent;
                document.getElementById('inputCount').textContent = input.value.length;
                doTranslate();
            }
        }

        async function doTranslate() {
            const text = document.getElementById('inputText').value.trim();
            if (!text) {
                showToast('请输入要翻译的文本');
                return;
            }

            const api = document.querySelector('input[name="api"]:checked').value;
            const requestId = ++translateRequestId;

            // 中止之前的请求，只有最新一次有效
            if (currentAbortController) {
                currentAbortController.abort();
            }
            currentAbortController = new AbortController();
            const signal = currentAbortController.signal;

            try {
                let result;
                if (api === 'mymemory') {
                    result = await translateMyMemory(text, sourceLang, targetLang, signal);
                } else if (api === 'lingva') {
                    result = await translateLingva(text, sourceLang, targetLang, signal);
                } else {
                    result = await translateLibre(text, sourceLang, targetLang, signal);
                }

                // 只接受最新请求的结果，且输入框内容没有变化
                const currentText = document.getElementById('inputText').value.trim();
                if (requestId === translateRequestId && currentText === text) {
                    const output = document.getElementById('outputText');
                    output.textContent = result;
                    output.classList.remove('placeholder');
                }
            } catch (err) {
                if (err.name === 'AbortError') return;
                const currentText = document.getElementById('inputText').value.trim();
                if (requestId === translateRequestId && currentText === text) {
                    console.error(err);
                    showToast('翻译失败: ' + (err.message || '请检查网络或服务配置'));
                }
            }
        }

        async function translateMyMemory(text, source, target, signal) {
            const sourceCode = source === 'auto' ? 'Autodetect' : source;
            const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${sourceCode}|${target}`;

            const res = await fetch(url, { signal });
            const data = await res.json();

            if (data.responseStatus !== 200) {
                throw new Error(data.responseDetails || 'MyMemory API 错误');
            }

            if (source === 'auto' && data.responseData.detectedLang) {
                // 可选：在检测到时给第一个 tab 加个小提示
                const firstTab = document.querySelector('#sourceTabs .lang-tab');
                if (firstTab) {
                    firstTab.title = `检测为 ${data.responseData.detectedLang.language}`;
                }
            }

            return data.responseData.translatedText;
        }

        async function translateLibre(text, source, target, signal) {
            const baseUrl = document.getElementById('libreUrl').value.replace(/\/$/, '');
            const url = `${baseUrl}/translate`;

            const body = {
                q: text,
                source: source === 'auto' ? 'auto' : source,
                target: target,
                format: 'text'
            };

            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body),
                signal
            });

            if (!res.ok) {
                const err = await res.text();
                throw new Error(`HTTP ${res.status}: ${err}`);
            }

            const data = await res.json();
            return data.translatedText;
        }

        async function translateLingva(text, source, target, signal) {
            const baseUrl = document.getElementById('lingvaUrl').value.replace(/\/$/, '');
            const sourceCode = source === 'auto' ? 'auto' : source;
            const url = `${baseUrl}/api/v1/${sourceCode}/${target}/${encodeURIComponent(text)}`;

            const res = await fetch(url, { signal });
            if (!res.ok) {
                const err = await res.text();
                throw new Error(`HTTP ${res.status}: ${err}`);
            }

            const data = await res.json();
            if (!data.translation) {
                throw new Error('Lingva 返回数据异常');
            }

            return data.translation;
        }

        function copyResult() {
            const output = document.getElementById('outputText');
            if (output.classList.contains('placeholder')) {
                showToast('没有可复制的内容');
                return;
            }
            navigator.clipboard.writeText(output.textContent).then(() => {
                showToast('已复制到剪贴板');
            });
        }

        async function loadVoices() {
            return new Promise((resolve) => {
                const voices = speechSynthesis.getVoices();
                if (voices && voices.length > 0) {
                    resolve(voices);
                    return;
                }
                const handler = () => {
                    const all = speechSynthesis.getVoices();
                    if (all.length > 0) {
                        speechSynthesis.removeEventListener('voiceschanged', handler);
                        resolve(all);
                    }
                };
                speechSynthesis.addEventListener('voiceschanged', handler);
                setTimeout(() => {
                    resolve(speechSynthesis.getVoices());
                }, 3000);
            });
        }

        function detectSpeechLang(text) {
            const chineseChars = (text.match(/[一-龥]/g) || []).length;
            const totalLetters = (text.replace(/\s/g, '').match(/[a-zA-Z]/g) || []).length;
            return chineseChars > totalLetters ? 'zh-CN' : 'en-US';
        }

        function getBrowser() {
            const ua = navigator.userAgent.toLowerCase();
            if (ua.includes('safari') && !ua.includes('chrome')) return 'safari';
            if (ua.includes('chrome') && !ua.includes('edg')) return 'chrome';
            if (ua.includes('edg')) return 'edge';
            return 'other';
        }

        function getVoiceByName(voices, names) {
            for (const name of names) {
                const found = voices.find(v => v.name.includes(name));
                if (found) return found;
            }
            return null;
        }

        function pickVoice(voices, lang) {
            const targetLang = lang.toLowerCase();

            // 英文优先使用推荐的高质量声音
            if (targetLang.startsWith('en')) {
                const browser = getBrowser();
                const priority = browser === 'safari' ? ['Samantha']
                               : browser === 'chrome' ? ['Ava']
                               : ['Samantha', 'Ava', 'Google US English'];
                const byName = getVoiceByName(voices, priority);
                if (byName) return byName;
            }

            let langVoices = voices.filter(v => v.lang.toLowerCase().startsWith(targetLang));
            if (!langVoices.length && targetLang.startsWith('zh')) {
                langVoices = voices.filter(v => v.lang.toLowerCase().startsWith('zh'));
            }
            if (langVoices.length) {
                return langVoices.find(v => v.localService)
                    || langVoices.find(v => v.default)
                    || langVoices[0];
            }
            return voices.find(v => v.default) || voices[0] || null;
        }

        function splitSentences(text, maxLen = 300) {
            const parts = text.replace(/([。！？.?!]+)(?=[\s\S]|$)/g, '$1\n').split('\n');
            const result = [];
            let buffer = '';
            for (const part of parts) {
                if ((buffer + part).length > maxLen && buffer) {
                    result.push(buffer);
                    buffer = part;
                } else {
                    buffer += part;
                }
            }
            if (buffer) result.push(buffer);
            return result.filter(Boolean);
        }

        let speakGeneration = 0;
        let currentSpeakingType = null;

        function updateSpeakButtons() {
            const inputBtn = document.getElementById('speakInput');
            const outputBtn = document.getElementById('speakOutput');
            if (inputBtn) inputBtn.textContent = currentSpeakingType === 'input' ? '⏹️' : '🔊';
            if (outputBtn) outputBtn.textContent = currentSpeakingType === 'output' ? '⏹️' : '🔊';
        }

        async function speak(type) {
            if (!window.speechSynthesis) {
                showToast('当前浏览器不支持语音朗读');
                return;
            }

            // 如果正在朗读同一面板，则停止
            if (currentSpeakingType === type) {
                window.speechSynthesis.cancel();
                currentSpeakingType = null;
                updateSpeakButtons();
                return;
            }

            const text = type === 'input'
                ? document.getElementById('inputText').value
                : document.getElementById('outputText').textContent;

            if (!text || (type === 'output' && document.getElementById('outputText').classList.contains('placeholder'))) {
                showToast('没有可朗读的内容');
                return;
            }

            const gen = ++speakGeneration;
            window.speechSynthesis.cancel();
            currentSpeakingType = type;
            updateSpeakButtons();

            const voices = await loadVoices();
            if (gen !== speakGeneration) return;
            if (!voices.length) {
                showToast('无法加载语音列表');
                currentSpeakingType = null;
                updateSpeakButtons();
                return;
            }

            // 确定朗读语言
            let lang;
            if (type === 'input') {
                lang = sourceLang === 'auto' ? detectSpeechLang(text) : (sourceLang === 'zh' ? 'zh-CN' : sourceLang);
            } else {
                lang = targetLang === 'auto' ? detectSpeechLang(text) : (targetLang === 'zh' ? 'zh-CN' : targetLang);
            }

            const voice = pickVoice(voices, lang);
            const sentences = splitSentences(text);
            let index = 0;

            function speakNext() {
                if (gen !== speakGeneration) return;
                if (index >= sentences.length) {
                    currentSpeakingType = null;
                    updateSpeakButtons();
                    return;
                }

                const utterance = new SpeechSynthesisUtterance(sentences[index]);
                utterance.lang = lang;
                utterance.rate = 0.9;
                utterance.pitch = 1;
                if (voice) utterance.voice = voice;

                utterance.onend = () => {
                    index++;
                    speakNext();
                };
                utterance.onerror = (e) => {
                    if (e.error === 'canceled' || e.error === 'interrupted') return;
                    currentSpeakingType = null;
                    updateSpeakButtons();
                    console.error('TTS error', e);
                };

                window.speechSynthesis.speak(utterance);
            }

            speakNext();
        }

        // 页面卸载时停止朗读，避免残留声音
        window.addEventListener('beforeunload', () => {
            if (window.speechSynthesis) window.speechSynthesis.cancel();
        });

        // 实时翻译 + 字符计数
        document.getElementById('inputText').addEventListener('input', function() {
            document.getElementById('inputCount').textContent = this.value.length;
            debounceTranslate();
        });

        // Ctrl+Enter 快捷翻译
        document.getElementById('inputText').addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'Enter') {
                doTranslate();
            }
        });

        // 保存服务地址变更
        document.getElementById('lingvaUrl').addEventListener('input', saveSettings);
        document.getElementById('libreUrl').addEventListener('input', saveSettings);

        // 初始化：加载设置并渲染
        loadSettings();
        renderLangTabs('sourceTabs', sourceLang, quickSource, true);
        renderLangTabs('targetTabs', targetLang, quickTarget, false);
        toggleApi();
    </script>
</body>
</html>
